spring.application.name=kunden-service
# Name der Anwendung (wird z.B. für Logging und Service Discovery verwendet)

# Server Konfiguration
server.port=9001
# Port, auf dem der Service läuft (wichtig für Docker und lokale Entwicklung)

# DATENBANK-KONFIGURATION
# Im Docker-Netzwerk: Host 'kunden-db', interner Port '5432'
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://kunden-db:5432/inhaber}
# Verbindungs-URL zur PostgreSQL-Datenbank. Im Docker-Netzwerk muss der Service-Name (kunden-db) verwendet werden.
spring.datasource.username=root
# Benutzername für die Datenbankverbindung.
spring.datasource.password=root
# Passwort für die Datenbankverbindung.
spring.datasource.driver-class-name=org.postgresql.Driver
# JDBC-Treiber für PostgreSQL, damit Spring Boot weiß, wie es sich verbinden soll.

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
# Hibernate aktualisiert das Datenbankschema automatisch beim Start (Tabellen/Spalten werden angepasst).
spring.jpa.show-sql=true
# Alle von Hibernate ausgeführten SQL-Befehle werden in der Konsole angezeigt (hilfreich zum Debuggen).

# Flyway Migration
spring.flyway.enabled=true
# Flyway wird aktiviert, um Datenbankmigrationen (Versionsverwaltung von SQL-Skripten) auszuführen.
spring.flyway.locations=classpath:db/migration
# Hier sucht Flyway nach Migrationsskripten (z.B. V1__init.sql).

# KAFKA PRODUCER KONFIGURATION
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9093}
# Adresse des Kafka-Brokers. Im Docker-Netzwerk ist das meist der Service-Name, lokal oft localhost.

# Serializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# Definiert, wie der Key einer Kafka-Nachricht beim Senden serialisiert wird (hier: als String).
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Definiert, wie der Value einer Kafka-Nachricht beim Senden serialisiert wird (hier: als JSON).

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/myRealm/protocol/openid-connect/certs#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/myRealm/protocol/openid-connect/certs
# URI, von der die öffentlichen Schlüssel für die JWT-Validierung geladen werden (Keycloak im Docker).
# (auskommentiert: Alternative URI für lokale Entwicklung)

# WICHTIG: Damit LocalDate (Datum) korrekt serialisiert wird
spring.jackson.date-format=yyyy-MM-dd
# Legt das Datumsformat für JSON-Serialisierung fest (z.B. 2024-05-01).

# Topic-Erstellung beim Start erlauben
spring.kafka.admin.auto-create=true
# Erlaubt, dass Kafka Topics beim Start automatisch erstellt werden.
spring.kafka.admin.fail-fast=false
# Service fährt nicht sofort herunter, wenn Kafka beim Start nicht erreichbar ist.

# LOGGING
logging.level.org.springframework=INFO
# Setzt das Loglevel für Spring Framework auf INFO (Standardausgaben, weniger Details).
logging.level.com.bank=DEBUG
# Setzt das Loglevel für deinen eigenen Code auf DEBUG (sehr ausführlich).
logging.level.org.hibernate.SQL=DEBUG
# Zeigt alle von Hibernate ausgeführten SQL-Befehle im Log an.