<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Inhaber Monitoring Dashboard</title>
    <!-- Keycloak für Authentifizierung -->
    <script src="http://localhost:8081/js/keycloak.js"></script>
    <style>
        /* ... (Dein CSS bleibt unverändert) ... */
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Inhaber Übersicht</h1>

    <!-- Authentifizierungsleiste mit Benutzeranzeige und Logout -->
    <div class="auth-bar">
        <div class="user-info">👤 <span id="user-display">Warte auf Login...</span></div>
        <button class="btn-danger" onclick="keycloak.logout()">Abmelden</button>
    </div>

    <!-- Navigations- und Aktions-Buttons -->
    <div class="button-row">
        <button class="btn-dark" onclick="window.location.href='http://localhost:9000'">🏠 Zum Dashboard</button>
        <button class="btn-primary" onclick="loadInhaber()">🔄 Liste aktualisieren</button>
    </div>

    <!-- Bereich für die Inhaber-Tabelle oder Statusmeldungen -->
    <div id="output">
        <p class="loading-msg">Daten werden geladen...</p>
    </div>
</div>

<script>
    // Keycloak-Konfiguration und Initialisierung
    const keycloak = new Keycloak({
        url: 'http://localhost:8081/',
        realm: 'myRealm',
        clientId: 'girokonto-service'
    });

    // Nach erfolgreichem Login Benutzername anzeigen und Inhaber laden
    keycloak.init({ onLoad: 'login-required', checkLoginIframe: false }).then(auth => {
        if (auth) {
            document.getElementById('user-display').textContent = keycloak.tokenParsed.preferred_username;
            loadInhaber();
        }
    });

    // Lädt alle Inhaber vom Backend (mit Auth-Token)
    function loadInhaber() {
        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML = '<p class="loading-msg">Hole Inhaber-Daten vom Service (Port 9001)...</p>';

        // Aktualisiert das Keycloak-Token, falls es bald abläuft (in den nächsten 30 Sekunden).
        // Das ist wichtig, damit alle nachfolgenden Requests ein gültiges JWT im Header haben.
        // Gibt ein Promise zurück, das bei Erfolg den Code im .then(...) ausführt.
        keycloak.updateToken(30).then(() => {
            fetch('http://localhost:9001/api/inhaber', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + keycloak.token,
                    'Accept': 'application/json'
                }
            })
            .then(res => {
                if (!res.ok) throw new Error('HTTP Status ' + res.status);
                return res.json();
            })
            .then(data => renderInhaber(data))
            .catch(err => {
                outputDiv.innerHTML = `<p style="color:red;">⚠️ Fehler beim Abruf: ${err.message}</p>`;
            });
        }).catch(() => keycloak.login());
    }

    // Rendert die Tabelle mit allen Inhabern
    function renderInhaber(inhaberListe) {
        const outputDiv = document.getElementById('output');
        
        if (!inhaberListe || inhaberListe.length === 0) {
            outputDiv.innerHTML = "<p>Keine Inhaber im System registriert.</p>";
            return;
        }

        let html = `
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Inhaber-ID</th>
                        <th>Vollständiger Name</th>
                        <th style="text-align:right;">Aktion</th>
                    </tr>
                </thead>
                <tbody>`;

        inhaberListe.forEach(inh => {
            // WICHTIG: Prüfung ob inh.inhaberId.value existiert (wegen DDD Value Object)
            const idValue = inh.inhaberId ? inh.inhaberId.value : inh.id;
            html += `
                <tr>
                    <td><span class="id-badge">${idValue}</span></td>
                    <td>${inh.name}</td>
                    <td style="text-align:right;">
                        <button class="btn-delete" onclick="deleteInhaber('${idValue}')">
                            🗑️ Inhaber & Konten löschen
                        </button>
                    </td>
                </tr>`;
        });

        html += `</tbody></table>`;
        outputDiv.innerHTML = html;
    }

    // Löscht einen Inhaber (und über Kafka auch alle zugehörigen Girokonten)
    async function deleteInhaber(id) {
        if (!confirm("WARNUNG: Das Löschen des Inhabers löscht über Kafka auch ALLE seine Girokonten im Girokonto-Service! Fortfahren?")) {
            return;
        }

        try {
            await keycloak.updateToken(30);
            const response = await fetch(`http://localhost:9001/api/inhaber/${id}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + keycloak.token
                }
            });

            if (response.ok) {
                alert("Inhaber-Löschung initiiert (Kafka-Prozess läuft).");
                loadInhaber(); // Liste neu laden
            } else {
                const errorMsg = await response.text();
                alert("Fehler beim Löschen: " + errorMsg);
            }
        } catch (err) {
            alert("Netzwerkfehler: " + err.message);
        }
    }
</script>

</body>
</html>
