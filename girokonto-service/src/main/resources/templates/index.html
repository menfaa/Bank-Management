<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Dashboard - Management & Zahlungen</title>
    <!-- Icons & Keycloak -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <script src="http://localhost:8081/js/keycloak.js"></script>
    
    <style>
        /* ... (Dein CSS bleibt unverändert) ... */
    </style>
</head>
<body>

<div class="container">
    <h1><i class="bi bi-bank me-2"></i>Bank Management</h1>

    <!-- Authentifizierungsleiste mit Status und Logout -->
    <div class="auth-bar">
        <div>
            <span id="auth-status-dot" class="status-dot" style="background: #dc3545;"></span>
            <span id="auth-text" class="fw-bold">Nicht verbunden</span> | <span id="user-name">Warte auf Login...</span>
        </div>
        <button class="btn-danger" style="padding: 5px 15px;" onclick="keycloak.logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>

    <!-- Navigations- und Aktions-Buttons -->
    <div class="button-row">
        <!-- Navigation Buttons -->
        <button class="btn-secondary" onclick="window.location.href='http://localhost:9000/girokonten'"><i class="bi bi-list-ul"></i> Alle Konten</button>
        <button class="btn-secondary" onclick="window.location.href='http://localhost:9001/inhaber'"><i class="bi bi-people"></i> Alle Inhaber</button>
        
        <!-- Action Buttons -->
        <button class="btn-success" onclick="toggleForm('inhaber-form')"><i class="bi bi-person-plus"></i> Neuer Inhaber</button>
        <button class="btn-info" onclick="toggleForm('girokonto-form')"><i class="bi bi-plus-circle"></i> Neues Konto</button>
        <button class="btn-purple" onclick="toggleForm('zahlung-form')"><i class="bi bi-currency-euro"></i> Neue Zahlung</button>
    </div>

    <!-- Formular: Neuer Inhaber -->
    <div id="inhaber-form" class="form-container" style="border-left-color: #28a745; display: block;">
        <h3><i class="bi bi-person-plus me-2"></i>Inhaber anlegen</h3>
        <label for="inhaber-id-input" style="font-size: 0.8rem; color: #666;">Inhaber-ID:</label>
        <input type="text" id="inhaber-id-input" placeholder="z.B. Inhaber123">
        <label for="inhaber-name" style="font-size: 0.8rem; color: #666;">Name:</label>
        <input type="text" id="inhaber-name" placeholder="Vollständiger Name des Inhabers">
        <div class="button-row">
            <button class="btn-success" onclick="createInhaber()">Speichern</button>
            <button class="btn-secondary" onclick="toggleForm('inhaber-form')">Abbrechen</button>
        </div>
    </div>

    <!-- Formular: Neues Girokonto -->
    <div id="girokonto-form" class="form-container" style="border-left-color: #17a2b8;">
        <h3><i class="bi bi-plus-circle me-2"></i>Konto eröffnen</h3>
        <input type="text" id="new-iban" placeholder="Neue IBAN (z.B. DE12345...)">
        <input type="text" id="new-inhaber-id" placeholder="Inhaber-ID (UUID)">
        <div class="button-row">
            <button class="btn-info" onclick="createGirokonto()">Konto erstellen</button>
            <button class="btn-secondary" onclick="toggleForm('girokonto-form')">Abbrechen</button>
        </div>
    </div>

    <!-- Formular: Zahlungsservice -->
    <div id="zahlung-form" class="form-container" style="border-left-color: #6f42c1;">
        <h3><i class="bi bi-credit-card-2-back me-2"></i>Zahlung ausführen</h3>
        <select id="zahlungsart" onchange="updateZahlungsFelder()">
            <option value="sepa">SEPA Überweisung</option>
            <option value="karte">Kartenzahlung</option>
        </select>
        <input type="text" id="main-iban" placeholder="Deine IBAN (Absender)">
        <input type="number" id="betrag" placeholder="Betrag in €" step="0.01">
        <input type="text" id="zweck" placeholder="Verwendungszweck">

        <!-- SEPA-spezifische Felder -->
        <div id="sepa-fields">
            <input type="text" id="empfaenger-iban" placeholder="Empfänger IBAN">
            <input type="text" id="empfaenger-name" placeholder="Empfänger Name">
        </div>
        <!-- Karten-spezifische Felder -->
        <div id="karte-fields" class="hidden">
            <input type="text" id="kartennummer" placeholder="Kartennummer (optional)">
            <input type="text" id="haendler" placeholder="Händler Name">
        </div>

        <div class="button-row">
            <button class="btn-purple" onclick="executePayment()">Zahlung senden</button>
            <button class="btn-secondary" onclick="toggleForm('zahlung-form')">Abbrechen</button>
        </div>
    </div>

    <!-- System-Log-Ausgabe -->
    <div style="margin-top: 30px;">
        <h3 style="font-size: 1rem; color: #666; font-weight: bold;">SYSTEM-LOG:</h3>
        <pre id="output">Initialisiere System...</pre>
    </div>
</div>

<script>
    // Keycloak-Konfiguration und Initialisierung
    const keycloak = new Keycloak({ url: 'http://localhost:8081/', realm: 'myRealm', clientId: 'girokonto-service' });

    // Fügt eine Nachricht zum System-Log hinzu
    function addLog(msg, type = 'info') {
        const out = document.getElementById('output');
        const time = new Date().toLocaleTimeString();
        if (out.textContent.includes("Initialisiere")) out.textContent = "";
        out.textContent += `[${time}] ${type === 'error' ? '❌' : (type === 'success' ? '✅' : '🔹')} ${msg}\n`;
        out.scrollTop = out.scrollHeight;
    }

    // Authentifizierung mit Keycloak
    keycloak.init({ onLoad: 'login-required', checkLoginIframe: false }).then(auth => {
        if (auth) {
            document.getElementById('auth-status-dot').style.background = "#28a745";
            document.getElementById('auth-text').textContent = "Verbunden";
            document.getElementById('user-name').textContent = "User: " + keycloak.tokenParsed.preferred_username;
            addLog("Authentifizierung erfolgreich.");
        }
    }).catch(() => addLog("Fehler bei der Authentifizierung", "error"));

    // Zeigt das gewünschte Formular an und blendet andere aus
    function toggleForm(id) {
        const forms = document.querySelectorAll('.form-container');
        forms.forEach(f => { if(f.id !== id) f.style.display = 'none'; });
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    // Zeigt die passenden Felder für SEPA oder Kartenzahlung an
    function updateZahlungsFelder() {
        const art = document.getElementById('zahlungsart').value;
        document.getElementById('sepa-fields').classList.toggle('hidden', art !== 'sepa');
        document.getElementById('karte-fields').classList.toggle('hidden', art !== 'karte');
    }

    // Erstellt einen neuen Inhaber (Kunden-Service)
    async function createInhaber() {
        const customId = document.getElementById('inhaber-id-input').value;
        const name = document.getElementById('inhaber-name').value;
        
        if(!customId || !name) {
            return addLog("Bitte ID und Namen eingeben!", "error");
        }

        const payload = {
            inhaberId: { value: customId },
            name: name
        };

        try {
            // Token aktualisieren
            await keycloak.updateToken(30);

            const response = await fetch('http://localhost:9001/api/inhaber', {
                method: 'POST',
                headers: { 
                    'Authorization': 'Bearer ' + keycloak.token,
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data =  await response.text();
                addLog(`ERFOLG: Inhaber ${data.name} erstellt.`, "success");
                toggleForm('inhaber-form');
            } else {
                const errorText = await response.text(); 
                addLog(`SERVER-FEHLER (${response.status}): ${errorText || 'Keine Details'}`, "error");
            }
        } catch (err) {
            addLog("NETZWERK-FEHLER: " + err.message, "error");
        }
    }

    // Erstellt ein neues Girokonto
    async function createGirokonto() {
        const iban = document.getElementById('new-iban').value;
        const inhaberId = document.getElementById('new-inhaber-id').value;
        if(!iban || !inhaberId) return addLog("Daten unvollständig!", "error");

        try {
            await keycloak.updateToken(30);
            const response = await fetch('http://localhost:9000/api/girokonten', {
                method: 'POST',
                headers: { 
                    'Authorization': 'Bearer ' + keycloak.token,
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ ibanValue: iban, inhaberIdValue: inhaberId })
            });
            if (response.ok) {
                addLog(`Konto ${iban} erfolgreich eröffnet.`, "success");
                toggleForm('girokonto-form');
                document.getElementById('new-iban').value = "";
                document.getElementById('new-inhaber-id').value = "";
            } else {
                addLog("Fehler beim Erstellen des Kontos", "error");
            }
        } catch (err) { addLog("Netzwerkfehler: " + err.message, "error"); }
    }

    // Führt eine Zahlung aus (SEPA oder Karte)
    async function executePayment() {
        const art = document.getElementById('zahlungsart').value;
        const iban = document.getElementById('main-iban').value;
        if (!iban) return addLog("Absender IBAN fehlt!", "error");

        const payload = {
            betrag: { wert: parseFloat(document.getElementById('betrag').value) },
            verwendungszweck: document.getElementById('zweck').value,
            datum: new Date().toISOString().split('T')[0]
        };

        let endpoint = `http://localhost:9000/api/girokonten/${iban}/` + (art === 'sepa' ? 'sepapayment' : 'kartenpayment');
        if (art === 'sepa') {
            payload.empfaengerIban = document.getElementById('empfaenger-iban').value;
            payload.empfaengerName = document.getElementById('empfaenger-name').value;
        } else {
            payload.kartennummer = document.getElementById('kartennummer').value;
            payload.haendler = document.getElementById('haendler').value;
        }

        try {
            await keycloak.updateToken(30);
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 
                    'Authorization': 'Bearer ' + keycloak.token, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                addLog(`Zahlung (${art}) erfolgreich gesendet!`, "success");
            } else {
                addLog(`Fehler: ${await response.text()}`, "error");
            }
        } catch (err) { addLog("Netzwerkfehler: " + err.message, "error"); }
    }
</script>
</body>
</html>
