##############################
# ALLGEMEINE ANWENDUNG
##############################
spring.application.name=girokonto-service
# Name der Anwendung, wird z.B. für Logging und Service Discovery verwendet.

server.port=9000
# Port, auf dem der Spring Boot Server läuft. Muss zu deiner Docker-Compose passen.

##############################
# DATENBANK-KONFIGURATION
##############################
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://girokonto-db:5432/girokonto}
# Verbindungs-URL zur PostgreSQL-Datenbank. Im Docker-Netzwerk muss der Service-Name (girokonto-db) verwendet werden.

spring.datasource.username=root
# Benutzername für die Datenbankverbindung.

spring.datasource.password=root
# Passwort für die Datenbankverbindung.

spring.datasource.driver-class-name=org.postgresql.Driver
# JDBC-Treiber für PostgreSQL, damit Spring Boot weiß, wie es sich verbinden soll.

##############################
# JPA / HIBERNATE
##############################
spring.jpa.hibernate.ddl-auto=update
# Hibernate aktualisiert das Datenbankschema automatisch beim Start (Tabellen/Spalten werden angepasst).

spring.jpa.show-sql=true
# Alle von Hibernate ausgeführten SQL-Befehle werden in der Konsole angezeigt (hilfreich zum Debuggen).

##############################
# FLYWAY MIGRATION
##############################
spring.flyway.enabled=true
# Flyway wird aktiviert, um Datenbankmigrationen (Versionsverwaltung von SQL-Skripten) auszuführen.

spring.flyway.locations=classpath:db/migration
# Hier sucht Flyway nach Migrationsskripten (z.B. V1__init.sql).

##############################
# KAFKA KONFIGURATION
##############################
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9093}
# Adresse des Kafka-Brokers. Im Docker-Netzwerk ist das meist der Service-Name, lokal oft localhost.

spring.kafka.consumer.group-id=girokonto-service
# Eindeutige Consumer-Gruppe für diesen Service. Verhindert, dass mehrere Instanzen dieselbe Nachricht mehrfach verarbeiten.

spring.kafka.consumer.auto-offset-reset=earliest
# Wenn kein Offset vorhanden ist, werden Nachrichten ab dem Anfang gelesen.

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Definiert, wie der Key einer Kafka-Nachricht beim Empfangen deserialisiert wird (hier: als String).

spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Definiert, wie der Value einer Kafka-Nachricht beim Empfangen deserialisiert wird (hier: als String).

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# Definiert, wie der Key einer Kafka-Nachricht beim Senden serialisiert wird (hier: als String).

spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Definiert, wie der Value einer Kafka-Nachricht beim Senden serialisiert wird (hier: als JSON).

spring.kafka.consumer.properties.spring.json.trusted.packages=*
# Erlaubt das Deserialisieren von JSON-Objekten aus allen Packages (wichtig für Events).

#spring.kafka.consumer.properties.spring.json.value.default.type=com.bank.common.events.PaymentCompletedEvent
# (auskommentiert) Würde einen Standardtyp für empfangene JSON-Nachrichten setzen.

spring.kafka.consumer.properties.spring.json.use.type.headers=true
# Nutzt Typ-Informationen aus den Kafka-Headern für die Deserialisierung.

##############################
# SECURITY / KEYCLOAK
##############################
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/myRealm/protocol/openid-connect/certs
# URI, von der die öffentlichen Schlüssel für die JWT-Validierung geladen werden (Keycloak im Docker).

#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/myRealm/protocol/openid-connect/certs
# (auskommentiert) Alternative URI für lokale Entwicklung.

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/myRealm
# Erwarteter Aussteller (Issuer) der JWT-Tokens. Muss mit dem Realm in Keycloak übereinstimmen.

##############################
# FEHLERTOLERANZ BEIM START
##############################
spring.kafka.listener.missing-topics-fatal=false
# Startet den Service auch, wenn Topics in Kafka noch nicht existieren (sonst würde der Service abbrechen).

spring.kafka.admin.fail-fast=false
# Service fährt nicht sofort herunter, wenn Kafka beim Start nicht erreichbar ist.

##############################
# LOGGING
##############################
logging.level.com.bank=DEBUG
# Setzt das Loglevel für deinen eigenen Code auf DEBUG (sehr ausführlich).

logging.level.org.springframework=INFO
# Setzt das Loglevel für Spring Framework auf INFO (Standardausgaben, weniger Details).

logging.level.org.apache.kafka=WARN
# Setzt das Loglevel für Kafka auf WARN (nur Warnungen und Fehler werden angezeigt).